name: CD - Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_ci:
        description: 'Skip CI checks'
        required: false
        default: 'false'

jobs:
  # -------------------------------------------------------
  # Step 1: Run CI checks (lint + build) before deploying
  # -------------------------------------------------------
  ci-check:
    name: CI Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint --if-present

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/yogdu_referral
          JWT_SECRET: ci-test-secret-do-not-use-in-production
          ARK_API_KEY: ci-test-key-do-not-use-in-production

  # -------------------------------------------------------
  # Step 2: Deploy to server via SSH
  # -------------------------------------------------------
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: ci-check
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Copy deploy script to server and execute
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_PORT: "3002"
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=60"

          echo "=== Uploading deploy script to server ==="
          sshpass -p "${SERVER_PASSWORD}" scp ${SSH_OPTS} \
            -P "${SERVER_PORT}" \
            .github/workflows/deploy.sh \
            "${SERVER_USER}@${SERVER_HOST}:/tmp/deploy.sh"

          echo "=== Syncing project files to server ==="
          # Create a tarball of the project (excluding .git, node_modules, .next)
          tar czf /tmp/project.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.env' \
            --exclude='.env.local' \
            .
          sshpass -p "${SERVER_PASSWORD}" scp ${SSH_OPTS} \
            -P "${SERVER_PORT}" \
            /tmp/project.tar.gz \
            "${SERVER_USER}@${SERVER_HOST}:/tmp/project.tar.gz"

          echo "=== Executing deploy script on server ==="
          sshpass -p "${SERVER_PASSWORD}" ssh ${SSH_OPTS} \
            -p "${SERVER_PORT}" \
            "${SERVER_USER}@${SERVER_HOST}" \
            "chmod +x /tmp/deploy.sh && \
             DATABASE_URL=\"${DATABASE_URL}\" \
             JWT_SECRET=\"${JWT_SECRET}\" \
             ARK_API_KEY=\"${ARK_API_KEY}\" \
             SMTP_HOST=\"${SMTP_HOST}\" \
             SMTP_PORT=\"${SMTP_PORT}\" \
             SMTP_USER=\"${SMTP_USER}\" \
             SMTP_PASS=\"${SMTP_PASS}\" \
             EMAIL_FROM=\"${EMAIL_FROM}\" \
             NEXT_PUBLIC_APP_URL=\"${NEXT_PUBLIC_APP_URL}\" \
             GITHUB_TOKEN=\"${GITHUB_TOKEN}\" \
             APP_PORT=\"${APP_PORT}\" \
             DEPLOY_SOURCE=tarball \
             bash /tmp/deploy.sh"

      - name: Health check
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=60"
          echo "=== Running health check ==="
          sshpass -p "${SERVER_PASSWORD}" ssh ${SSH_OPTS} \
            -p "${SERVER_PORT}" \
            "${SERVER_USER}@${SERVER_HOST}" \
            "curl -sf http://localhost:3002 > /dev/null && echo 'Health check PASSED' || echo 'Health check FAILED'"

          echo "=== Deployment finished ==="
